name: OpenClaw Verification Test
on: workflow_dispatch

jobs:
  test-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install OpenClaw
        # Using -g and forcing the install to ensure binary availability
        run: npm install -g openclaw@latest

      - name: Start OpenClaw & Tunnel
        env:
          SETUP_PASSWORD: "admin"
        run: |
          # Use npx to start the gateway directly. 
          # This fixes the "command not found" error.
          npx openclaw gateway start & 
          
          # Wait 30 seconds for the server to spin up
          sleep 30
          
          # Create the Pinggy tunnel
          ssh -p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
              -R0:localhost:18789 qr@free.pinggy.io
              
