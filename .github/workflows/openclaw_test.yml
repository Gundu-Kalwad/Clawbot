name: Clawbot Test

on:
  workflow_dispatch:

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Install Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenClaw
        run: curl -fsSL https://openclaw.ai/install.sh | bash

      - name: Add openclaw to PATH
        run: echo "$(npm prefix -g)/bin" >> $GITHUB_PATH

      - name: Configure Telegram channel
        run: openclaw channels add --channel telegram --token $TELEGRAM_BOT_TOKEN

      - name: Set Groq as default model
        run: openclaw config set agents.defaults.model.primary "groq/llama-3.3-70b-versatile"

      - name: Start gateway
        run: openclaw gateway start

      - name: Check health
        run: |
          sleep 10
          openclaw health
          openclaw status

      - name: Keep alive for testing
        run: |
          echo "Bot is live. Message your Telegram bot now."
          sleep 1800  # 30 min, change to 21600 for full 6 hours

      - name: Logs on exit
        if: always()
        run: openclaw logs --limit 100
