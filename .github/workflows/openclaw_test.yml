name: Clawbot Test

on:
  workflow_dispatch:

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache OpenClaw npm package
        id: cache-openclaw
        uses: actions/cache@v4
        with:
          path: |
            /opt/hostedtoolcache/node/22.22.0/x64/lib/node_modules/openclaw
            ~/.npm-global
          key: openclaw-${{ runner.os }}-node22

      - name: Install OpenClaw (skip onboarding)
        if: steps.cache-openclaw.outputs.cache-hit != 'true'
        run: curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard

      - name: Add openclaw to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Fix extensions permissions
        run: chmod -R 755 $(npm root -g)/openclaw/extensions

      - name: Run non-interactive onboarding with Groq
        run: |
          openclaw onboard \
            --non-interactive \
            --accept-risk \
            --mode local \
            --auth-choice custom-api-key \
            --custom-base-url "https://api.groq.com/openai/v1" \
            --custom-model-id "llama-3.3-70b-versatile" \
            --custom-api-key "$GROQ_API_KEY" \
            --custom-compatibility openai \
            --gateway-port 18789 \
            --gateway-bind loopback || true

      - name: Configure Telegram and fix Node 22 polling
        run: |
          openclaw config set channels.telegram.botToken "$TELEGRAM_BOT_TOKEN"
          openclaw config set channels.telegram.allowFrom '["*"]'
          openclaw config set channels.telegram.dmPolicy "open"
          openclaw config set channels.telegram.network.autoSelectFamily false

      - name: Start gateway in background
        run: nohup openclaw gateway > /tmp/openclaw.log 2>&1 &

      - name: Wait for gateway to be ready
        run: sleep 15

      - name: Keep alive for testing
        run: |
          echo "Bot is live. Send /status first, then test messages."
          sleep 1800

      - name: Logs on exit
        if: always()
        run: |
          cat /tmp/openclaw/openclaw-*.log || true
          cat /tmp/openclaw.log || true
