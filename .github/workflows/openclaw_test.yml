name: OpenClaw Verification Test
on: workflow_dispatch # Manual trigger from Actions tab

jobs:
  test-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Install Node.js 22
        run: |
          curl -fsSL https://deb.nodesource.com | sudo -E bash -
          sudo apt-get install -y nodejs

      - name: Install OpenClaw
        run: curl -fsSL https://openclaw.bot/install.sh | bash

      - name: Start OpenClaw & Tunnel
        run: |
          # Start the gateway in the background
          openclaw gateway start & 
          
          # Wait for the gateway to initialize on port 18789
          sleep 10
          
          # Create the Pinggy tunnel. 
          # Use 'qr@' to get a scannable QR code in your GitHub Action logs.
          ssh -p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
              -R0:localhost:18789 qr@free.pinggy.io
              
