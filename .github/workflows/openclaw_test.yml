name: Clawbot Test

on:
  workflow_dispatch:

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenClaw (skip onboarding)
        run: curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard

      - name: Add openclaw to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Run non-interactive onboarding with Groq
        run: |
          openclaw onboard \
            --non-interactive \
            --accept-risk \
            --mode local \
            --auth-choice skip \
            --gateway-port 18789 \
            --gateway-bind loopback \
            --skip-skills

      - name: Set Groq as primary model
        run: openclaw models set groq/llama-3.3-70b-versatile

      - name: Add Telegram channel
        run: |
          openclaw channels add \
            --channel telegram \
            --token $TELEGRAM_BOT_TOKEN

      - name: Start gateway
        run: openclaw gateway start

      - name: Health check
        run: |
          sleep 10
          openclaw health

      - name: Keep alive for testing
        run: |
          echo "Bot is live. Message your Telegram bot now."
          sleep 1800

      - name: Logs on exit
        if: always()
        run: openclaw logs --limit 100
