name: OpenClaw Verification Test
on: workflow_dispatch

jobs:
  test-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install OpenClaw
        run: curl -fsSL https://openclaw.bot | bash

      - name: Start OpenClaw & Tunnel
        run: |
          # Start the gateway in the background
          openclaw gateway start & 
          
          # Wait for the gateway to initialize on port 18789
          sleep 15
          
          # Pinggy tunnel with QR code generation in logs
          ssh -p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
              -R0:localhost:18789 qr@free.pinggy.io
              
