name: OpenClaw Verification Test
on: workflow_dispatch

jobs:
  test-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install OpenClaw
        # Added '|| true' to ignore the TTY/onboarding exit code 1
        run: curl -fsSL https://openclaw.ai | bash || true

      - name: Start OpenClaw & Tunnel
        env:
          # Use this password to log in to the web dashboard
          SETUP_PASSWORD: "admin" 
        run: |
          # 1. Initialize the gateway in background
          openclaw gateway start & 
          
          # 2. Wait 30 seconds for the server to spin up on port 18789
          sleep 30
          
          # 3. Create the Pinggy tunnel. 
          # Look for the URL and QR code in the Action logs!
          ssh -p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
              -R0:localhost:18789 qr@free.pinggy.io
              
